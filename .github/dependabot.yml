# .github/dependabot.yml
version: 2
updates:
  # npm 依赖更新配置
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "dependabot"
      include: "scope"
    labels:
      - "dependencies"
      - "npm"
    versioning-strategy: "auto"
    groups:
      npm-dependencies:
        patterns:
          - "*"

  # GitHub Actions 工作流更新配置
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "dependabot"
      include: "scope"
    labels:
      - "dependencies"
      - "github-actions"
    groups:
      github-actions:
        patterns:
          - "*"

